check_for_update_on_startup = false
approval_policy = "never"

notify = ["sh", "/home/fabric/.codex/fabric_notify.sh"]

model = "gpt-5.5"
model_reasoning_effort = "medium"

[features]
hooks = true

[[hooks.UserPromptSubmit]]
matcher = ""

[[hooks.UserPromptSubmit.hooks]]
type = "command"
command = "sh /home/fabric/.codex/fabric_notify.sh"
timeout = 5
statusMessage = "Updating Fabric status"

[[hooks.PreToolUse]]
matcher = ".*"

[[hooks.PreToolUse.hooks]]
type = "command"
command = "sh /home/fabric/.codex/fabric_notify.sh"
timeout = 5
statusMessage = "Updating Fabric status"

[[hooks.PostToolUse]]
matcher = ".*"

[[hooks.PostToolUse.hooks]]
type = "command"
command = "sh /home/fabric/.codex/fabric_notify.sh"
timeout = 5
statusMessage = "Updating Fabric status"

[[hooks.Stop]]
matcher = ""

[[hooks.Stop.hooks]]
type = "command"
command = "sh /home/fabric/.codex/fabric_notify.sh"
timeout = 5
statusMessage = "Updating Fabric status"

[notice.model_migrations]
"gpt-5.1-codex-mini" = "gpt-5.2-codex"
"gpt-5.2" = "gpt-5.5"
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"
"gpt-5.4" = "gpt-5.5"

[projects."/workspace"]
trust_level = "trusted"

[otel]
# Fabric reconciles these values at agent start time when telemetry is enabled.
enabled = false
environment = "production"
log_user_prompt = false   # redact user prompts unless explicitly enabled
metrics_exporter = "statsig"
exporter."otlp-grpc".endpoint = "localhost:4317"
exporter."otlp-grpc".headers = { "x-otlp-meta" = "abc123" }
trace_exporter."otlp-grpc".endpoint = "localhost:4317"
trace_exporter."otlp-grpc".headers = { "x-otlp-meta" = "abc123" }

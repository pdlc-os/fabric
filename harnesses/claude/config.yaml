harness: claude
image: fabric-claude:latest
user: fabric
# provisioner.type is container-script so the container-side provision.py
# handles auth resolution, API key pre-approval, project path setup, MCP
# server translation, and other harness-native config writes. Existing
# installations that still have type: builtin can run
# `fabric harness-config upgrade claude --activate-script` to migrate.
provisioner:
  type: container-script
  interface_version: 1
  lib: vendored
  command: ["python3", "/home/fabric/.fabric/harness/provision.py"]
  timeout: 30s
  lifecycle_events:
    - pre-start
  required_image_tools:
    - python3
config_dir: .claude
skills_dir: .claude/skills
interrupt_key: Escape
interrupt_sequence:
  - Escape
  - Escape
  - Escape
interrupt_signal: sequence
instructions_file: .claude/CLAUDE.md
system_prompt_file: .claude/system-prompt.md
system_prompt_mode: native
model_aliases:
  small: haiku
  medium: sonnet
  large: opus
  extra-large: opus
env:
  ANTHROPIC_MODEL: "opus"
  ANTHROPIC_SMALL_FAST_MODEL: "haiku"
command:
  base: ["claude", "--no-chrome", "--dangerously-skip-permissions"]
  resume_flag: "--continue"
  task_position: after_base_args
  system_prompt_flag: "--system-prompt"
capabilities:
  limits:
    max_turns: { support: "yes" }
    max_model_calls: { support: "no", reason: "This harness does not emit model-end hook events" }
    max_duration: { support: "yes" }
  telemetry:
    enabled: { support: "yes" }
    native_emitter: { support: "yes" }
  prompts:
    system_prompt: { support: "yes" }
    agent_instructions: { support: "yes" }
  auth:
    api_key: { support: "yes" }
    auth_file: { support: "yes" }
    oauth_token: { support: "yes" }
    vertex_ai: { support: "yes" }
    bedrock: { support: "yes" }
  mcp:
    stdio: { support: "yes" }
    sse: { support: "yes" }
    streamable_http: { support: "yes" }
  resume: { support: "yes" }
no_auth:
  behavior: drop-to-shell
  command: claude setup-token
  message: |
    This agent started without credentials.
    Run: claude setup-token
    Then run: python3 /home/fabric/.fabric/harness/capture_auth.py
auth:
  default_type: api-key
  types:
    api-key:
      required_env:
        - any_of: ["ANTHROPIC_API_KEY"]
    oauth-token:
      required_env:
        - any_of: ["CLAUDE_CODE_OAUTH_TOKEN"]
    auth-file:
      required_files:
        - name: CLAUDE_AUTH
          type: file
          target_suffix: "/.claude/.credentials.json"
          field: ClaudeAuthFile
    vertex-ai:
      required_env:
        - any_of: ["GOOGLE_CLOUD_PROJECT"]
        - any_of: ["GOOGLE_CLOUD_REGION", "CLOUD_ML_REGION", "GOOGLE_CLOUD_LOCATION"]
      required_files:
        - name: gcloud-adc
          type: file
          description: "Google Cloud Application Default Credentials (ADC) file for vertex-ai authentication"
          field: GoogleAppCredentials
          alternative_env_keys: ["GOOGLE_APPLICATION_CREDENTIALS"]
          skipped_when_gcp_service_account_assigned: true
          required: true
    bedrock:
      required_env:
        - any_of: ["AWS_REGION", "AWS_DEFAULT_REGION"]
        # One credential style: Bedrock API key, static access keys, or a
        # named profile resolved from a mounted ~/.aws.
        - any_of: ["AWS_BEARER_TOKEN_BEDROCK", "AWS_ACCESS_KEY_ID", "AWS_PROFILE"]
        # Secret material for the chosen style. Every legitimate combination
        # satisfies this group; it exists so AWS_SECRET_ACCESS_KEY and
        # AWS_SESSION_TOKEN are declared and therefore gathered/staged by
        # the config-driven env pipeline.
        - any_of: ["AWS_SECRET_ACCESS_KEY", "AWS_SESSION_TOKEN", "AWS_BEARER_TOKEN_BEDROCK", "AWS_PROFILE"]
      required_files:
        # Profile-based auth (enterprise SSO flows materialize short-lived
        # STS credentials into ~/.aws/credentials). Optional: env-only
        # credential styles need neither file.
        - name: AWS_CREDENTIALS
          type: file
          target_suffix: "/.aws/credentials"
          description: "AWS shared credentials file (profile-based Bedrock authentication)"
          field: AwsCredentialsFile
          alternative_env_keys: ["AWS_SHARED_CREDENTIALS_FILE"]
          required: false
        - name: AWS_CONFIG
          type: file
          target_suffix: "/.aws/config"
          description: "AWS config file (profile definitions and region)"
          field: AwsConfigFile
          alternative_env_keys: ["AWS_CONFIG_FILE"]
          required: false
  autodetect:
    env:
      CLAUDE_CODE_OAUTH_TOKEN: oauth-token
      GOOGLE_APPLICATION_CREDENTIALS: vertex-ai
      GOOGLE_CLOUD_PROJECT: vertex-ai
      ANTHROPIC_API_KEY: api-key
      # Strong Bedrock signals only — bare AWS_REGION/AWS_PROFILE are common
      # in environments that never touch Bedrock.
      AWS_BEARER_TOKEN_BEDROCK: bedrock
      CLAUDE_CODE_USE_BEDROCK: bedrock
    files:
      CLAUDE_AUTH: auth-file
      gcloud-adc: vertex-ai

# Common rebuild: scion-base, catalog harness images, and scion-hub.
# Skips core-base and uses existing core-base:<_TAG>.
steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'verify-registry'
    entrypoint: 'bash'
    args: ['image-build/scripts/verify-registry.sh', '$_REGISTRY']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'setup-buildx'
    args: ['buildx', 'create', '--name', 'mybuilder', '--use']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'bootstrap-buildx'
    args: ['buildx', 'inspect', '--bootstrap']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-base'
    args: ['buildx', 'build', '--platform', 'linux/amd64,linux/arm64', '--build-arg', 'BASE_IMAGE=$_REGISTRY/core-base:$_TAG', '--build-arg', 'GIT_COMMIT=$_COMMIT_SHA', '-t', '$_REGISTRY/scion-base:$_SHORT_SHA', '-t', '$_REGISTRY/scion-base:$_TAG', '-f', 'image-build/scion-base/Dockerfile', '--pull', '--push', '.']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-antigravity'
    dir: 'harnesses/antigravity'
    args: ['buildx', 'build', '--platform', 'linux/amd64,linux/arm64', '--build-arg', 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA', '-t', '$_REGISTRY/scion-antigravity:$_SHORT_SHA', '-t', '$_REGISTRY/scion-antigravity:$_TAG', '-f', 'Dockerfile', '--pull', '--push', '.']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-claude'
    dir: 'harnesses/claude'
    args: ['buildx', 'build', '--platform', 'linux/amd64,linux/arm64', '--build-arg', 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA', '-t', '$_REGISTRY/scion-claude:$_SHORT_SHA', '-t', '$_REGISTRY/scion-claude:$_TAG', '-f', 'Dockerfile', '--pull', '--push', '.']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-codex'
    dir: 'harnesses/codex'
    args: ['buildx', 'build', '--platform', 'linux/amd64,linux/arm64', '--build-arg', 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA', '-t', '$_REGISTRY/scion-codex:$_SHORT_SHA', '-t', '$_REGISTRY/scion-codex:$_TAG', '-f', 'Dockerfile', '--pull', '--push', '.']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-copilot'
    dir: 'harnesses/copilot'
    args: ['buildx', 'build', '--platform', 'linux/amd64,linux/arm64', '--build-arg', 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA', '-t', '$_REGISTRY/scion-copilot:$_SHORT_SHA', '-t', '$_REGISTRY/scion-copilot:$_TAG', '-f', 'Dockerfile', '--pull', '--push', '.']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-hermes'
    dir: 'harnesses/hermes'
    args: ['buildx', 'build', '--platform', 'linux/amd64,linux/arm64', '--build-arg', 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA', '-t', '$_REGISTRY/scion-hermes:$_SHORT_SHA', '-t', '$_REGISTRY/scion-hermes:$_TAG', '-f', 'Dockerfile', '--pull', '--push', '.']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-opencode'
    dir: 'harnesses/opencode'
    args: ['buildx', 'build', '--platform', 'linux/amd64,linux/arm64', '--build-arg', 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA', '-t', '$_REGISTRY/scion-opencode:$_SHORT_SHA', '-t', '$_REGISTRY/scion-opencode:$_TAG', '-f', 'Dockerfile', '--pull', '--push', '.']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-hub'
    dir: 'image-build/hub'
    args: ['buildx', 'build', '--platform', 'linux/amd64,linux/arm64', '--build-arg', 'BASE_IMAGE=$_REGISTRY/scion-base:$_SHORT_SHA', '-t', '$_REGISTRY/scion-hub:$_SHORT_SHA', '-t', '$_REGISTRY/scion-hub:$_TAG', '-f', 'Dockerfile', '--pull', '--push', '.']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

substitutions:
  _REGISTRY: 'us-central1-docker.pkg.dev/${PROJECT_ID}/public-docker'
  _TAG: 'latest'
options:
  dynamicSubstitutions: true
  machineType: 'E2_HIGHCPU_8'
timeout: 3600s

apiVersion: v1
kind: Pod
metadata:
  name: nm2-test-agent-a
  namespace: fabric-agents
  labels:
    test: nm2-scenario-a
    fabric.dev/project-id: test-project-alpha
spec:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  initContainers:
  - name: workspace-provision
    image: alpine/git:latest
    command:
    - sh
    - -c
    - |
      set -e
      SENTINEL="/workspace/.fabric-provisioned"
      if [ -f "$SENTINEL" ]; then
        echo "PROVISION: sentinel found, skipping clone"
        exit 0
      fi
      echo "PROVISION: cloning workspace..."
      git clone --depth 1 https://github.com/ptone/fabric.git /workspace
      echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$SENTINEL"
      echo "PROVISION: clone complete, sentinel written"
    volumeMounts:
    - name: workspace
      mountPath: /workspace
      subPath: projects/test-project-alpha/workspace
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
  containers:
  - name: agent
    image: busybox:1.36
    command:
    - sh
    - -c
    - |
      echo "=== WORKSPACE CONTENTS ==="
      ls -la /workspace/
      echo "=== SENTINEL CHECK ==="
      cat /workspace/.fabric-provisioned 2>/dev/null && echo "SENTINEL: present" || echo "SENTINEL: missing"
      echo "=== ISOLATION CHECK ==="
      echo "Attempting to access parent dir..."
      ls /workspace/../ 2>&1 || echo "ISOLATION: cannot traverse up"
      echo "=== WORKSPACE MOUNT INFO ==="
      mount | grep workspace || echo "mount info unavailable in busybox"
      echo "=== UID/GID CHECK ==="
      id
      echo "=== TEST COMPLETE ==="
      sleep 30
    volumeMounts:
    - name: workspace
      mountPath: /workspace
      subPath: projects/test-project-alpha/workspace
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
  volumes:
  - name: workspace
    persistentVolumeClaim:
      claimName: fabric-workspaces
  restartPolicy: Never
  tolerations:
  - key: "kubernetes.io/arch"
    operator: "Equal"
    value: "amd64"
    effect: "NoSchedule"

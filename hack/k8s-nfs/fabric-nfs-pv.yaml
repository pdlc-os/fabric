apiVersion: v1
kind: Namespace
metadata:
  name: scion-agents
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: scion-workspaces
spec:
  capacity:
    storage: 1Ti
  accessModes: [ReadWriteMany]
  nfs:
    server: 10.45.255.170
    path: /scion_share
  mountOptions: [vers=3, hard, nconnect=4]
  persistentVolumeReclaimPolicy: Retain
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scion-workspaces
  namespace: scion-agents
spec:
  accessModes: [ReadWriteMany]
  storageClassName: ""
  volumeName: scion-workspaces
  resources:
    requests:
      storage: 1Ti

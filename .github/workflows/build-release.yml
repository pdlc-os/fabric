name: Build Multi-Arch Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  images:
    name: Build and Push Agent Images
    # Skip pre-release tags (matching the Homebrew tap job below).
    if: ${{ !contains(github.ref_name, '-') }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-images.yml
    with:
      registry: ghcr.io/pdlc-os
      target: all
      tag: latest

  build:
    name: Build Multi-Arch Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux builds
          - goos: linux
            goarch: amd64
            output: fabric-linux-amd64
          - goos: linux
            goarch: arm64
            output: fabric-linux-arm64
          # macOS builds
          - goos: darwin
            goarch: amd64
            output: fabric-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: fabric-darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Build Web UI
        working-directory: ./web
        run: |
          npm ci
          npm run build

      - name: Get version info
        id: version
        run: |
          # Get version from git tag
          if git describe --tags --exact-match >/dev/null 2>&1; then
            VERSION=$(git describe --tags --exact-match)
          else
            VERSION=""
          fi
          
          COMMIT=$(git rev-parse HEAD 2>/dev/null || echo "unknown")
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PKG="github.com/pdlc-os/fabric/pkg/version"
          
          # Build ldflags, only including version if available
          LDFLAGS="-X ${PKG}.Commit=${COMMIT} -X ${PKG}.BuildTime=${BUILD_TIME}"
          if [ -n "$VERSION" ]; then
            LDFLAGS="${LDFLAGS} -X ${PKG}.Version=${VERSION}"
          fi
          
          echo "ldflags=${LDFLAGS}" >> $GITHUB_OUTPUT
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -ldflags "${{ steps.version.outputs.ldflags }}" -o dist/fabric ./cmd/fabric
          tar -czvf ${{ matrix.output }}.tar.gz -C dist fabric

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Prepare release assets
        run: |
          mkdir -p release
          find binaries -type f -exec mv {} release/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: false
          generate_release_notes: true

  homebrew:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Render and push formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set; skipping tap update."
            exit 0
          fi
          case "$TAG" in
            *-*)
              echo "Pre-release tag ${TAG}; skipping tap update."
              exit 0
              ;;
          esac

          mkdir -p tarballs
          find binaries -type f -name '*.tar.gz' -exec mv {} tarballs/ \;
          ./packaging/homebrew/render.sh "$TAG" tarballs > rendered-fabric.rb

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/pdlc-os/homebrew-fabric.git" tap
          mkdir -p tap/Formula
          mv rendered-fabric.rb tap/Formula/fabric.rb
          cd tap
          git config user.name "fabric-release-bot"
          git config user.email "noreply@github.com"
          git add Formula/fabric.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged; nothing to push."
            exit 0
          fi
          git commit -m "fabric ${TAG}"
          git push origin HEAD:main
